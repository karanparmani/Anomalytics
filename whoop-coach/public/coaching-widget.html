<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: light dark;
      --ink: var(--color-text-primary, #17211c);
      --muted: var(--color-text-secondary, #66736c);
      --panel: var(--color-background-secondary, #f4f7f5);
      --surface: var(--color-background-primary, #ffffff);
      --line: var(--color-border-secondary, #dce5df);
      --green: #20b26b;
      --yellow: #d99a22;
      --red: #df5c50;
      --accent: #18a669;
      font-family: var(--font-sans, Inter, ui-sans-serif, system-ui, sans-serif);
    }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: var(--surface); }
    button { font: inherit; }
    .shell { padding: 18px; display: grid; gap: 14px; min-height: 360px; }
    .hero { border: 1px solid var(--line); border-radius: 20px; padding: 18px; background: linear-gradient(145deg, color-mix(in srgb, var(--panel) 88%, var(--accent)), var(--surface)); }
    .hero-top, .section-head, .actions { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .eyebrow { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    h1 { font-size: clamp(22px, 5vw, 34px); line-height: 1.05; margin: 8px 0 4px; letter-spacing: -.035em; }
    .sub { color: var(--muted); font-size: 13px; }
    .badge { display: inline-flex; align-items: center; gap: 7px; padding: 7px 11px; border-radius: 999px; font-size: 12px; font-weight: 700; border: 1px solid var(--line); background: var(--surface); }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
    .green .dot { background: var(--green); box-shadow: 0 0 0 5px color-mix(in srgb, var(--green) 15%, transparent); }
    .yellow .dot { background: var(--yellow); box-shadow: 0 0 0 5px color-mix(in srgb, var(--yellow) 15%, transparent); }
    .red .dot { background: var(--red); box-shadow: 0 0 0 5px color-mix(in srgb, var(--red) 15%, transparent); }
    .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 9px; margin-top: 16px; }
    .metric { border: 1px solid var(--line); border-radius: 14px; padding: 12px; background: color-mix(in srgb, var(--surface) 90%, transparent); }
    .metric-label { color: var(--muted); font-size: 11px; }
    .metric-value { font-size: 22px; font-weight: 750; margin-top: 4px; letter-spacing: -.03em; }
    .metric-unit { color: var(--muted); font-size: 11px; margin-left: 3px; font-weight: 500; }
    .grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 14px; }
    .card { border: 1px solid var(--line); border-radius: 18px; padding: 16px; background: var(--surface); }
    .card h2 { margin: 0; font-size: 15px; }
    .chart { height: 150px; width: 100%; margin-top: 12px; overflow: visible; }
    .chart-line { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .chart-fill { fill: color-mix(in srgb, var(--accent) 13%, transparent); }
    .axis { stroke: var(--line); stroke-width: 1; }
    .insights { display: grid; gap: 9px; margin-top: 12px; }
    .insight { display: grid; grid-template-columns: 8px 1fr; gap: 10px; border-radius: 12px; padding: 11px; background: var(--panel); }
    .insight-bar { border-radius: 999px; background: var(--accent); }
    .insight.caution .insight-bar { background: var(--yellow); }
    .insight-title { font-size: 13px; font-weight: 720; }
    .insight-detail, .insight-action { color: var(--muted); font-size: 12px; line-height: 1.45; margin-top: 3px; }
    .insight-action { color: var(--ink); }
    .button { cursor: pointer; border: 1px solid var(--line); color: var(--ink); background: var(--surface); border-radius: 999px; padding: 9px 13px; font-weight: 700; font-size: 12px; }
    .button.primary { color: white; background: var(--accent); border-color: var(--accent); }
    .button:disabled { opacity: .6; cursor: wait; }
    .connect { text-align: center; padding: 44px 20px; border: 1px dashed var(--line); border-radius: 18px; background: var(--panel); }
    .connect h1 { margin: 10px auto; max-width: 460px; }
    .connect p { color: var(--muted); max-width: 520px; margin: 0 auto 20px; line-height: 1.55; }
    .foot { color: var(--muted); font-size: 10px; line-height: 1.4; }
    .error { color: var(--red); font-size: 12px; }
    @media (max-width: 700px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .grid { grid-template-columns: 1fr; }
      .hero-top { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main id="root" class="shell" aria-live="polite"><div class="sub">Loading your coaching view…</div></main>
  <script>
    (() => {
      const root = document.getElementById("root");
      let requestId = 1;
      const pending = new Map();

      const escapeHtml = (value) => String(value ?? "—").replace(/[&<>'"]/g, (character) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
      })[character]);

      const bridgeRequest = (method, params) => new Promise((resolve, reject) => {
        const id = requestId++;
        pending.set(id, { resolve, reject });
        window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
        setTimeout(() => {
          if (pending.delete(id)) reject(new Error("The host did not respond."));
        }, 20000);
      });

      const callTool = async (name, args = {}) => {
        if (window.openai?.callTool) return window.openai.callTool(name, args);
        return bridgeRequest("tools/call", { name, arguments: args });
      };

      const openExternal = async (href) => {
        if (window.openai?.openExternal) return window.openai.openExternal({ href });
        return bridgeRequest("ui/open-link", { url: href });
      };

      const metric = (label, value, unit = "") => `
        <div class="metric"><div class="metric-label">${escapeHtml(label)}</div>
        <div class="metric-value">${escapeHtml(value)}<span class="metric-unit">${escapeHtml(unit)}</span></div></div>`;

      const chartMarkup = (history) => {
        const values = history.slice(-21).map((day) => day.recoveryScore).filter((value) => typeof value === "number");
        if (values.length < 2) return '<div class="sub" style="margin-top:16px">A trend appears after two scored recovery days.</div>';
        const width = 500, height = 140, pad = 10;
        const points = values.map((value, index) => {
          const x = pad + index * ((width - pad * 2) / Math.max(1, values.length - 1));
          const y = height - pad - (value / 100) * (height - pad * 2);
          return `${x.toFixed(1)},${y.toFixed(1)}`;
        }).join(" ");
        const fill = `${pad},${height - pad} ${points} ${width - pad},${height - pad}`;
        return `<svg class="chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="Recent recovery trend">
          <line class="axis" x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}" />
          <line class="axis" x1="${pad}" y1="${height / 2}" x2="${width - pad}" y2="${height / 2}" />
          <polygon class="chart-fill" points="${fill}" /><polyline class="chart-line" points="${points}" />
        </svg>`;
      };

      const renderDisconnected = (payload) => {
        root.innerHTML = `<section class="connect">
          <div class="eyebrow">Personal WHOOP Coach</div><h1>Connect your WHOOP to begin</h1>
          <p>Authorize read-only access to recovery, sleep, strain, and workout data. Tokens are encrypted and the connection can be revoked from WHOOP.</p>
          <button id="connect" class="button primary">Connect WHOOP</button>
          <div id="connect-error" class="error" style="margin-top:12px"></div>
        </section>`;
        document.getElementById("connect").addEventListener("click", async () => {
          try { await openExternal(payload.authorizationUrl); }
          catch { document.getElementById("connect-error").textContent = "Could not open WHOOP authorization. Try asking ChatGPT for a new connection link."; }
        });
      };

      const renderDashboard = (payload) => {
        const dashboard = payload.dashboard;
        const today = dashboard.today ?? {};
        const insights = (dashboard.insights ?? []).map((item) => `<div class="insight ${escapeHtml(item.severity)}">
          <div class="insight-bar"></div><div><div class="insight-title">${escapeHtml(item.title)}</div>
          <div class="insight-detail">${escapeHtml(item.detail)}</div><div class="insight-action">${escapeHtml(item.action)}</div></div></div>`).join("");
        root.innerHTML = `
          <section class="hero"><div class="hero-top"><div><div class="eyebrow">Today’s coaching signal</div>
            <h1>${escapeHtml(dashboard.headline)}</h1><div class="sub">Updated ${new Date(dashboard.generatedAt).toLocaleString()}</div></div>
            <div class="badge ${escapeHtml(dashboard.readiness)}"><span class="dot"></span>${escapeHtml(dashboard.readiness)}</div></div>
            <div class="metrics">
              ${metric("Recovery", today.recoveryScore, "%")}${metric("HRV", today.hrvMs, "ms")}
              ${metric("Resting HR", today.restingHeartRate, "bpm")}${metric("Sleep", today.sleepPerformance, "%")}
            </div></section>
          <section class="grid"><div class="card"><div class="section-head"><h2>Recovery trend</h2><button id="refresh" class="button">Refresh WHOOP</button></div>
            ${chartMarkup(dashboard.history ?? [])}<div id="refresh-status" class="sub"></div></div>
            <div class="card"><h2>Coach’s priorities</h2><div class="insights">${insights}</div></div></section>
          <div class="foot">${escapeHtml(dashboard.disclaimer)}</div>`;
        document.getElementById("refresh").addEventListener("click", async (event) => {
          const button = event.currentTarget;
          const status = document.getElementById("refresh-status");
          button.disabled = true; status.textContent = "Reconciling the latest WHOOP records…";
          try {
            await callTool("refresh_whoop_data", {});
            const refreshed = await callTool("show_coaching_dashboard", { days: 42 });
            const output = refreshed?.structuredContent ?? refreshed?.result?.structuredContent;
            if (output) render(output); else status.textContent = "Refresh complete. Ask ChatGPT to reopen the dashboard.";
          } catch { status.textContent = "Refresh failed. Your existing coaching data is still available."; button.disabled = false; }
        });
      };

      const render = (payload) => {
        if (!payload || payload.connected === false) return renderDisconnected(payload ?? {});
        if (payload.dashboard) return renderDashboard(payload);
        root.innerHTML = '<div class="sub">Waiting for coaching data…</div>';
      };

      window.addEventListener("message", (event) => {
        const message = event.data;
        if (!message || message.jsonrpc !== "2.0") return;
        if (message.id && pending.has(message.id)) {
          const task = pending.get(message.id); pending.delete(message.id);
          if (message.error) task.reject(new Error(message.error.message)); else task.resolve(message.result);
          return;
        }
        if (message.method === "ui/notifications/tool-result") render(message.params?.structuredContent);
      });

      const initial = window.openai?.toolOutput;
      if (initial) render(initial);
    })();
  </script>
</body>
</html>
